<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memory Flip ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #08080f;
    --surface: #10101e;
    --surface2: #17172a;
    --border: #2a2a44;
    --border-bright: #4f4f88;
    --text: #f0eeff;
    --muted: #6b6b9a;
    --accent1: #b48aff;
    --accent2: #5ee7ff;
    --accent3: #ff5ec4;
    --accent4: #ffde6b;
    --matched-glow: #22d3ee;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: 0;
  }

  /* ── FLOATING BLOBS ── */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
    animation: blobFloat 8s ease-in-out infinite;
  }
  .blob1 { width: 400px; height: 400px; background: var(--accent1); top: -100px; left: -100px; animation-delay: 0s; }
  .blob2 { width: 350px; height: 350px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -3s; }
  .blob3 { width: 250px; height: 250px; background: var(--accent3); top: 50%; left: 60%; animation-delay: -5s; }
  @keyframes blobFloat {
    0%, 100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(20px, -20px) scale(1.04); }
    66% { transform: translate(-15px, 15px) scale(0.97); }
  }

  /* ── LAYOUT ── */
  .wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 28px;
    animation: slideDown 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo-tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    border-radius: 100px;
    padding: 4px 14px;
    margin-bottom: 14px;
    opacity: 0.8;
  }
  .game-title {
    font-size: clamp(42px, 10vw, 72px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #b48aff 0%, #5ee7ff 45%, #ff5ec4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .game-title .hollow {
    -webkit-text-stroke: 2px var(--accent1);
    -webkit-text-fill-color: transparent;
    background: none;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
    animation: slideDown 0.7s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 80px;
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat.s-timer::before { background: var(--accent2); }
  .stat.s-moves::before { background: var(--accent1); }
  .stat.s-pairs::before { background: var(--accent3); }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -1px;
  }
  .stat.s-timer .stat-value { color: var(--accent2); }
  .stat.s-moves .stat-value { color: var(--accent1); }
  .stat.s-pairs .stat-value { color: var(--accent3); }

  /* ── DIFF BUTTONS ── */
  .diff-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    animation: slideDown 0.7s 0.15s cubic-bezier(0.22,1,0.36,1) both;
  }
  .diff-btn {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 22px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .diff-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .diff-btn:hover { color: var(--text); border-color: var(--border-bright); }
  .diff-btn.active {
    color: var(--bg);
    border-color: transparent;
  }
  .diff-btn.active::after { opacity: 1; }
  .diff-btn span { position: relative; z-index: 1; }

  /* ── GRID ── */
  #grid {
    display: grid;
    gap: 10px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.2s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── CARD ── */
  .card-wrap { perspective: 700px; }
  .card {
    width: 100%;
    aspect-ratio: 1;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4,0.2,0.2,1);
    cursor: pointer;
    border-radius: 16px;
  }
  .card:hover .card-front { border-color: var(--accent1); transform: rotateY(0deg) scale(1.04); }
  .card.flipped, .card.matched { transform: rotateY(180deg); }
  .card.matched:hover { transform: rotateY(180deg) scale(1.02); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .card-front {
    background: var(--surface);
    border: 1px solid var(--border);
    transition: border-color 0.25s, transform 0.2s;
    overflow: hidden;
  }
  .card-front::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(180,138,255,0.07), transparent 60%);
  }
  .card-front .icon {
    font-size: 22px;
    opacity: 0.2;
    filter: grayscale(1);
  }

  .card-back {
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    transform: rotateY(180deg);
    font-size: clamp(22px, 5vw, 34px);
  }
  .card.matched .card-back {
    background: #0e1f2e;
    border-color: var(--matched-glow);
    box-shadow: 0 0 20px rgba(34,211,238,0.2), inset 0 0 20px rgba(34,211,238,0.05);
    animation: matchPop 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes matchPop {
    0%   { transform: rotateY(180deg) scale(1); }
    40%  { transform: rotateY(180deg) scale(1.1); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  /* ── RESTART ── */
  .restart-btn {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: var(--bg);
    background: linear-gradient(135deg, var(--accent1), var(--accent3));
    border: none;
    border-radius: 14px;
    padding: 14px 40px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s 0.3s both;
  }
  .restart-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent2), var(--accent1));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .restart-btn:hover::before { opacity: 1; }
  .restart-btn:active { transform: scale(0.97); }
  .restart-btn span { position: relative; z-index: 1; }

  /* ── WIN MODAL ── */
  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,8,15,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(6px);
    animation: fadeIn 0.35s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .win-card {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 28px;
    padding: 44px 40px;
    text-align: center;
    max-width: 340px;
    width: 92%;
    position: relative;
    overflow: hidden;
    animation: winPop 0.5s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes winPop {
    from { transform: scale(0.75) translateY(30px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .win-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
  }
  .win-big { font-size: 64px; margin-bottom: 12px; }
  .win-title {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }
  .win-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }
  .win-stat {
    background: var(--surface2);
    border-radius: 12px;
    padding: 12px;
  }
  .win-stat-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .win-stat-val {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent4);
  }
  .win-play-btn {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 15px;
    background: linear-gradient(135deg, var(--accent1), var(--accent3));
    color: var(--bg);
    border: none;
    border-radius: 14px;
    padding: 13px 36px;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s, transform 0.15s;
  }
  .win-play-btn:hover { opacity: 0.88; }
  .win-play-btn:active { transform: scale(0.97); }

  /* ── CONFETTI ── */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 300;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="wrapper">
  <header class="header">
    <div class="logo-tag">✦ brain game</div>
    <div class="game-title">MEM<span class="hollow">ORY</span><br>FLIP</div>
  </header>

  <div class="stats-bar">
    <div class="stat s-timer">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timer">00:00</div>
    </div>
    <div class="stat s-moves">
      <div class="stat-label">Moves</div>
      <div class="stat-value" id="moves">0</div>
    </div>
    <div class="stat s-pairs">
      <div class="stat-label">Pairs</div>
      <div class="stat-value"><span id="pairs">0</span>/<span id="total">8</span></div>
    </div>
  </div>

  <div class="diff-row">
    <button class="diff-btn active" onclick="setDiff(4, this)"><span>Easy 4×4</span></button>
    <button class="diff-btn" onclick="setDiff(6, this)"><span>Hard 6×6</span></button>
  </div>

  <div id="grid"></div>

  <button class="restart-btn" onclick="startGame()"><span>⟳ Shuffle & Play</span></button>
</div>

<script>
const EMOJIS = [
  '🦊','🐬','🌺','🎸','🍩','🔮','🦋','🏆',
  '🎯','🐙','🦄','🌙','🍕','🎲','🐉','🌈',
  '🧸','🦚'
];

let gridSize = 4;
let firstCard = null, secondCard = null;
let lockBoard = false;
let moves = 0, matched = 0;
let timerInterval = null, seconds = 0, started = false;

function setDiff(size, btn) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  gridSize = size;
  startGame();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function fmt(s) {
  return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
}

function startGame() {
  clearInterval(timerInterval);
  seconds = 0; started = false; moves = 0; matched = 0;
  firstCard = null; secondCard = null; lockBoard = false;

  document.getElementById('timer').textContent = '00:00';
  document.getElementById('moves').textContent = '0';
  document.getElementById('pairs').textContent = '0';

  const pairs = (gridSize * gridSize) / 2;
  document.getElementById('total').textContent = pairs;

  const pool = EMOJIS.slice(0, pairs);
  const cards = shuffle([...pool, ...pool]);

  const grid = document.getElementById('grid');
  const vw = Math.min(500, window.innerWidth - 40);
  const size = Math.floor((vw - (gridSize - 1) * 10) / gridSize);
  grid.style.gridTemplateColumns = `repeat(${gridSize}, ${size}px)`;
  grid.innerHTML = '';

  cards.forEach((emoji) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.style.width = size + 'px';

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.value = emoji;
    card.innerHTML = `
      <div class="card-face card-front"><span class="icon">✦</span></div>
      <div class="card-face card-back">${emoji}</div>`;
    card.addEventListener('click', onFlip);
    wrap.appendChild(card);
    grid.appendChild(wrap);
  });
}

function onFlip(e) {
  const card = e.currentTarget;
  if (lockBoard || card.classList.contains('flipped') || card.classList.contains('matched')) return;

  if (!started) {
    started = true;
    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById('timer').textContent = fmt(seconds);
    }, 1000);
  }

  card.classList.add('flipped');

  if (!firstCard) { firstCard = card; return; }
  secondCard = card;
  moves++;
  document.getElementById('moves').textContent = moves;
  lockBoard = true;

  if (firstCard.dataset.value === secondCard.dataset.value) {
    firstCard.classList.add('matched');
    secondCard.classList.add('matched');
    matched++;
    document.getElementById('pairs').textContent = matched;
    reset();
    const pairs = (gridSize * gridSize) / 2;
    if (matched === pairs) { clearInterval(timerInterval); setTimeout(showWin, 450); }
  } else {
    setTimeout(() => {
      firstCard.classList.remove('flipped');
      secondCard.classList.remove('flipped');
      reset();
    }, 950);
  }
}

function reset() { firstCard = null; secondCard = null; lockBoard = false; }

function launchConfetti() {
  const colors = ['#b48aff','#5ee7ff','#ff5ec4','#ffde6b','#ffffff'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: -10px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      animation-duration: ${1.5 + Math.random() * 2}s;
      animation-delay: ${Math.random() * 0.6}s;
      transform: rotate(${Math.random() * 360}deg);
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      width: ${6 + Math.random() * 6}px;
      height: ${6 + Math.random() * 6}px;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

function showWin() {
  launchConfetti();
  const pairs = (gridSize * gridSize) / 2;
  const overlay = document.createElement('div');
  overlay.className = 'win-overlay';
  overlay.innerHTML = `
    <div class="win-card">
      <div class="win-big">🎉</div>
      <div class="win-title">You Won!</div>
      <div class="win-grid">
        <div class="win-stat">
          <div class="win-stat-label">Time</div>
          <div class="win-stat-val">${fmt(seconds)}</div>
        </div>
        <div class="win-stat">
          <div class="win-stat-label">Moves</div>
          <div class="win-stat-val">${moves}</div>
        </div>
        <div class="win-stat">
          <div class="win-stat-label">Pairs</div>
          <div class="win-stat-val">${pairs}</div>
        </div>
        <div class="win-stat">
          <div class="win-stat-label">Score</div>
          <div class="win-stat-val">${Math.max(100, 1000 - moves * 10 - seconds)}</div>
        </div>
      </div>
      <button class="win-play-btn" onclick="this.closest('.win-overlay').remove(); startGame()">⟳ Play Again</button>
    </div>`;
  document.body.appendChild(overlay);
}

startGame();
</script>
</body>
</html>
